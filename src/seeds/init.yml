# .github/workflows/init.yml
#
# Self-contained init workflow: updates agentic-lib, runs init, tests, and
# pushes directly to main. Does not create PRs or depend on other workflows.
# On purge mode, closes any hanging init-related PRs to avoid conflicts.

name: init
run-name: "init [${{ github.ref_name }}]"

on:
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Init mode"
        type: choice
        required: false
        default: "update"
        options:
          - update
          - reseed
          - purge
      dry-run:
        description: "Preview changes without writing files"
        type: boolean
        required: false
        default: false
      mission-seed:
        description: "Mission seed name (purge only)"
        type: choice
        required: false
        default: "hamming-distance"
        options:
          - hamming-distance
          - fizz-buzz
          - roman-numerals
          - lunar-lander
          - string-utils
          - dense-encoding
          - plot-code-lib
          - cron-engine
          - owl-ontology
          - time-series-lab
          - empty
      mission-text:
        description: "Freeform mission text for MISSION.md (overrides mission-seed if provided)"
        type: string
        required: false
        default: ""
      schedule:
        description: "Supervisor schedule (leave empty to keep current)"
        type: choice
        required: false
        default: ""
        options:
          - ""
          - "off"
          - "weekly"
          - "daily"
          - "hourly"
          - "continuous"
      model:
        description: "Copilot SDK model for LLM requests (leave empty to keep current)"
        type: choice
        required: false
        default: ""
        options:
          - ""
          - gpt-5-mini
          - claude-sonnet-4
          - gpt-4.1

permissions: write-all

jobs:
  init:
    runs-on: ubuntu-latest
    env:
      INIT_MODE: ${{ inputs.mode || 'update' }}
      INIT_DRY_RUN: ${{ inputs.dry-run || 'false' }}
      INIT_MISSION_SEED: ${{ inputs.mission-seed || 'hamming-distance' }}
      INIT_MISSION_TEXT: ${{ inputs.mission-text || '' }}
      INIT_SCHEDULE: ${{ inputs.schedule || '' }}
      INIT_MODEL: ${{ inputs.model || 'gpt-5-mini' }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.WORKFLOW_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      # Close any hanging init-related PRs on purge to avoid conflicts
      - name: Close hanging init PRs (purge mode)
        if: env.INIT_MODE == 'purge'
        env:
          GH_TOKEN: ${{ secrets.WORKFLOW_TOKEN }}
        run: |
          echo "Closing any hanging init-related PRs..."
          INIT_PRS=$(gh pr list --state open --json number,headRefName --jq '.[] | select(.headRefName | startswith("agentic-lib-init-")) | .number')
          if [ -z "$INIT_PRS" ]; then
            echo "No hanging init PRs found"
          else
            for PR_NUM in $INIT_PRS; do
              echo "Closing PR #$PR_NUM"
              gh pr close "$PR_NUM" --comment "Closed by init purge workflow to avoid conflicts." --delete-branch || echo "Warning: Failed to close PR #$PR_NUM"
            done
          fi

      - name: Update agentic-lib to latest
        run: npm update @xn-intenton-z2a/agentic-lib

      - name: Run init
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          FLAGS="init"
          if [ "$INIT_MODE" = "reseed" ]; then FLAGS="$FLAGS --reseed"; fi
          if [ "$INIT_MODE" = "purge" ]; then FLAGS="$FLAGS --purge --mission $INIT_MISSION_SEED"; fi
          if [ "$INIT_DRY_RUN" = "true" ]; then FLAGS="$FLAGS --dry-run"; fi
          npx @xn-intenton-z2a/agentic-lib $FLAGS

      - name: Write mission text (if provided, overrides seed)
        if: env.INIT_MISSION_TEXT != ''
        run: |
          printf '# Mission\n\n%s\n' "$INIT_MISSION_TEXT" > MISSION.md
          echo "Wrote custom mission text to MISSION.md"

      # Update supervisor schedule if requested (inlined from agent-supervisor-schedule.yml)
      - name: Update supervisor schedule and model
        if: env.INIT_SCHEDULE != ''
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const frequency = process.env.INIT_SCHEDULE;
            const model = process.env.INIT_MODEL || 'gpt-5-mini';
            const workflowPath = '.github/workflows/agent-supervisor.yml';
            const tomlPath = 'agentic-lib.toml';

            const SCHEDULE_MAP = {
              off: null,
              weekly: '0 6 * * 1',
              daily: '0 6 * * *',
              hourly: '0 * * * *',
              continuous: '*/15 * * * *',
            };

            // Update agent-supervisor.yml schedule if it exists
            if (fs.existsSync(workflowPath)) {
              let content = fs.readFileSync(workflowPath, 'utf8');
              const cron = SCHEDULE_MAP[frequency];

              // Remove any existing schedule block
              content = content.replace(/\n  schedule:\n    - cron: "[^"]*"\n/g, '\n');

              if (cron) {
                // Insert schedule block after the 'on:' line
                const scheduleBlock = `\n  schedule:\n    - cron: "${cron}"\n`;
                content = content.replace(/\non:\n/, `\non:${scheduleBlock}`);
              }

              // Stamp the file with current date so GitHub re-registers cron schedules
              const dateStamp = `# Schedule updated: ${new Date().toISOString()}`;
              const stampRegex = /^# Schedule updated: .*/m;
              if (stampRegex.test(content)) {
                content = content.replace(stampRegex, dateStamp);
              } else {
                content = content.replace(/^(# .*\n)+/m, (match) => match + dateStamp + '\n');
              }

              fs.writeFileSync(workflowPath, content);
              core.info(`Updated supervisor schedule to: ${frequency} (cron: ${cron || 'none'})`);
            } else {
              core.info('agent-supervisor.yml not found — skipping schedule update');
            }

            // Update agentic-lib.toml with model and supervisor settings
            if (fs.existsSync(tomlPath)) {
              let toml = fs.readFileSync(tomlPath, 'utf8');

              // Update model setting within [schedule] section
              const scheduleModelRegex = /(\[schedule\][^\[]*?)(^\s*model\s*=\s*"[^"]*")/m;
              if (scheduleModelRegex.test(toml)) {
                toml = toml.replace(scheduleModelRegex, `$1model = "${model}"`);
              } else if (toml.match(/^\[schedule\]/m)) {
                const supervisorLineRegex = /^(\s*supervisor\s*=\s*"[^"]*")(\s*#.*)?$/m;
                if (supervisorLineRegex.test(toml)) {
                  toml = toml.replace(supervisorLineRegex, `$1$2\nmodel = "${model}"`);
                } else {
                  toml = toml.replace(/^(\[schedule\].*)$/m, `$1\nmodel = "${model}"`);
                }
              }

              // Update supervisor setting within [schedule] section
              const scheduleSupervisorRegex = /(\[schedule\][^\[]*?)(^\s*supervisor\s*=\s*"[^"]*")/m;
              if (scheduleSupervisorRegex.test(toml)) {
                toml = toml.replace(scheduleSupervisorRegex, `$1supervisor = "${frequency}"`);
              }

              fs.writeFileSync(tomlPath, toml);
              core.info(`Updated agentic-lib.toml: model=${model}, supervisor=${frequency}`);
            } else {
              core.info('agentic-lib.toml not found — skipping config update');
            }

      - run: npm install

      - name: Install agentic-step deps
        run: cd .github/agentic-lib/actions/agentic-step && npm ci

      - run: npm test

      - name: Commit and push to main
        env:
          GH_TOKEN: ${{ secrets.WORKFLOW_TOKEN }}
        run: |
          # Use the WORKFLOW_TOKEN owner's identity so GitHub re-registers cron schedules
          TOKEN_USER=$(gh api /user --jq '.login')
          TOKEN_ID=$(gh api /user --jq '.id')
          git config user.name "${TOKEN_USER}"
          git config user.email "${TOKEN_ID}+${TOKEN_USER}@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          VERSION=$(npx @xn-intenton-z2a/agentic-lib version 2>/dev/null || echo "latest")
          git commit -m "init ${INIT_MODE} (agentic-lib@${VERSION})"
          git push origin main

      # Dispatch supervisor if schedule was updated and not set to 'off'
      - name: Dispatch supervisor
        if: env.INIT_SCHEDULE != '' && env.INIT_SCHEDULE != 'off'
        env:
          GH_TOKEN: ${{ secrets.WORKFLOW_TOKEN }}
        run: |
          if gh workflow list --json name --jq '.[].name' | grep -q "^agent-supervisor$"; then
            echo "Dispatching agent-supervisor workflow..."
            gh workflow run agent-supervisor.yml --repo $GITHUB_REPOSITORY || echo "Warning: Failed to dispatch agent-supervisor workflow"
          else
            echo "agent-supervisor workflow not found, skipping dispatch"
          fi
