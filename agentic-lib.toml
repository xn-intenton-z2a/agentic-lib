# agentic-lib.toml — Configuration for agentic-lib workflows
#
# Locally: paths point to test/ so dry-run workflows operate on test fixtures.
# During init: #@dist transforms restore standard paths for consumer repos.

[schedule]
supervisor = "daily"              # off | weekly | daily | hourly | continuous

[paths]
mission = "test/MISSION.md"                     #@dist "MISSION.md"
source = "test/src/lib/"                        #@dist "src/lib/"
tests = "test/tests/unit/"                      #@dist "tests/unit/"
features = "test/features/"                     #@dist "features/"
library = "test/library/"                       #@dist "library/"
docs = "test/docs/"                             #@dist "docs/"
examples = "test/examples/"                     #@dist "examples/"
readme = "test/README.md"                       #@dist "README.md"
dependencies = "test/package.json"              #@dist "package.json"
contributing = "test/CONTRIBUTING.md"           #@dist "CONTRIBUTING.md"
library-sources = "test/SOURCES.md"             #@dist "SOURCES.md"

[execution]
build = "npm run build"
test = "npm test"
start = "npm run start"

[limits]
feature-issues = 2
maintenance-issues = 1
attempts-per-branch = 3
attempts-per-issue = 2
features-limit = 2
library-limit = 32

[tuning]
# Profile sets defaults for all tuning knobs: min | recommended | max
# See [tuning.profile.*] below for the full default values per profile.
profile = "min"                                  #@dist "recommended"
#
# Model selection — each has different strengths:
#   gpt-5-mini      — Fast, cheap, supports reasoning-effort. Best for CI and iteration.
#   claude-sonnet-4  — Strong code quality, nuanced reasoning. Best for complex transforms.
#   gpt-4.1         — High capability, large context. Best for thorough analysis.
# Note: reasoning-effort only works with gpt-5-mini and o4-mini.
# For other models it is automatically skipped.
model = "gpt-5-mini"
#
# Override individual knobs below. Omit or comment out to use profile defaults.
# reasoning-effort = "low"       # low | medium | high | none (none = disable entirely)
infinite-sessions = false        # set to true for long sessions with compaction
# transformation-budget = 4      # max code-changing cycles per run (0 = unlimited)
# features-scan = 3              # feature files to include in prompts
# source-scan = 3                # source files to include
# source-content = 1000          # max chars per source file
# issues-scan = 5                # open issues to include
# document-summary = 500         # max chars for document summaries
# discussion-comments = 5        # discussion comments to include

# ─── Tuning Profile Reference ────────────────────────────────────────
# These sections document the built-in profile defaults. They are
# read-only reference — the active profile is set by [tuning].profile
# above. Override individual knobs in [tuning] to deviate from a profile.

[tuning.profile.min]
# Fast & cheap — CI testing, quick validation, budget-conscious iteration.
reasoning-effort = "low"
infinite-sessions = false
transformation-budget = 4
features-scan = 3
source-scan = 3
source-content = 1000
issues-scan = 5
document-summary = 500
discussion-comments = 5

[tuning.profile.recommended]
# Balanced — good results without excessive cost. Default for consumer repos.
reasoning-effort = "medium"
infinite-sessions = true
transformation-budget = 8
features-scan = 10
source-scan = 10
source-content = 5000
issues-scan = 20
document-summary = 2000
discussion-comments = 10

[tuning.profile.max]
# Thorough — maximum context, highest quality. For complex missions.
reasoning-effort = "high"
infinite-sessions = true
transformation-budget = 32
features-scan = 50
source-scan = 50
source-content = 20000
issues-scan = 100
document-summary = 10000
discussion-comments = 25

[bot]
log-file = "test/intentïon.md"                  #@dist "intentïon.md"
