# agentic-lib.toml — Configuration for agentic-lib workflows
#
# Locally: paths point to test/ so dry-run workflows operate on test fixtures.
# During init: #@dist transforms restore standard paths for consumer repos.

[schedule]
supervisor = "daily"              # off | weekly | daily | hourly | continuous

[paths]
mission = "test/MISSION.md"                     #@dist "MISSION.md"
source = "test/src/lib/"                        #@dist "src/lib/"
tests = "test/tests/unit/"                      #@dist "tests/unit/"
features = "test/features/"                     #@dist "features/"
library = "test/library/"                       #@dist "library/"
docs = "test/docs/"                             #@dist "docs/"
examples = "test/examples/"                     #@dist "examples/"
readme = "test/README.md"                       #@dist "README.md"
dependencies = "test/package.json"              #@dist "package.json"
contributing = "test/CONTRIBUTING.md"           #@dist "CONTRIBUTING.md"
library-sources = "test/SOURCES.md"             #@dist "SOURCES.md"

[execution]
build = "npm run build"
test = "npm test"
start = "npm run start"

[limits]
# Override profile defaults here. Omit to use the active profile's values.
# feature-issues = 2
# maintenance-issues = 1
# attempts-per-branch = 3
# attempts-per-issue = 2
# features-limit = 2
# library-limit = 32

[tuning]
# Profile sets defaults for all tuning and limit knobs: min | recommended | max
# Profile definitions live in [profiles.*] sections below.
profile = "min"                                  #@dist "recommended"
#
# Model selection — each has different strengths:
#   gpt-5-mini      — Fast, cheap, supports reasoning-effort. Best for CI and iteration.
#   claude-sonnet-4  — Strong code quality, nuanced reasoning. Best for complex transforms.
#   gpt-4.1         — High capability, large context. Best for thorough analysis.
# Note: reasoning-effort only works with gpt-5-mini and o4-mini.
# For other models it is automatically skipped.
model = "gpt-5-mini"
#
# Override individual knobs below. Omit or comment out to use profile defaults.
# reasoning-effort = "low"       # low | medium | high | none (none = disable entirely)
infinite-sessions = false        # set to true for long sessions with compaction
# transformation-budget = 4      # max code-changing cycles per run (0 = unlimited)
# features-scan = 3              # feature files to include in prompts
# source-scan = 3                # source files to include
# source-content = 1000          # max chars per source file
# test-content = 500             # max chars per test file (separate from source)
# issues-scan = 5                # open issues to include
# issue-body-limit = 200         # max chars per issue body in prompts
# stale-days = 14                # exclude issues with no activity beyond this age
# document-summary = 500         # max chars for document summaries
# discussion-comments = 5        # discussion comments to include

# ─── Profile Definitions ────────────────────────────────────────────
# Each profile defines tuning and limits defaults. The active profile
# is set by [tuning].profile above. Override individual values in
# [tuning] or [limits] to deviate from the active profile.

[profiles.min]
# Fast & cheap — CI testing, quick validation, budget-conscious iteration.
reasoning-effort = "low"                # low | medium | high | none
infinite-sessions = false               # enable session compaction for long runs
transformation-budget = 4              # max code-changing cycles per run
features-scan = 3                      # max feature files included in prompts
source-scan = 3                        # max source files included in prompts
source-content = 1000                  # max chars per source file in prompts
test-content = 500                     # max chars per test file in prompts
issues-scan = 5                        # max open issues included in prompts
issue-body-limit = 200                 # max chars per issue body in prompts
stale-days = 14                        # days of inactivity before issue is excluded
document-summary = 500                 # max chars for document summaries in prompts
discussion-comments = 5               # max discussion comments included in prompts
feature-issues = 1                     # max concurrent feature development issues
maintenance-issues = 1                 # max concurrent maintenance issues
attempts-per-branch = 2               # max transform attempts on a single branch
attempts-per-issue = 1                 # max transform attempts on a single issue
features-limit = 2                     # max feature files in features/ directory
library-limit = 8                      # max library entries in library/ directory

[profiles.recommended]
# Balanced — good results without excessive cost. Default for consumer repos.
reasoning-effort = "medium"            # low | medium | high | none
infinite-sessions = true               # enable session compaction for long runs
transformation-budget = 8             # max code-changing cycles per run
features-scan = 10                     # max feature files included in prompts
source-scan = 10                       # max source files included in prompts
source-content = 5000                  # max chars per source file in prompts
test-content = 3000                    # max chars per test file in prompts
issues-scan = 20                       # max open issues included in prompts
issue-body-limit = 500                 # max chars per issue body in prompts
stale-days = 30                        # days of inactivity before issue is excluded
document-summary = 2000                # max chars for document summaries in prompts
discussion-comments = 10              # max discussion comments included in prompts
feature-issues = 2                     # max concurrent feature development issues
maintenance-issues = 1                 # max concurrent maintenance issues
attempts-per-branch = 3               # max transform attempts on a single branch
attempts-per-issue = 2                 # max transform attempts on a single issue
features-limit = 4                     # max feature files in features/ directory
library-limit = 32                     # max library entries in library/ directory

[profiles.max]
# Thorough — maximum context, highest quality. For complex missions.
reasoning-effort = "high"              # low | medium | high | none
infinite-sessions = true               # enable session compaction for long runs
transformation-budget = 32            # max code-changing cycles per run
features-scan = 50                     # max feature files included in prompts
source-scan = 50                       # max source files included in prompts
source-content = 20000                 # max chars per source file in prompts
test-content = 15000                   # max chars per test file in prompts
issues-scan = 100                      # max open issues included in prompts
issue-body-limit = 2000                # max chars per issue body in prompts
stale-days = 90                        # days of inactivity before issue is excluded
document-summary = 10000               # max chars for document summaries in prompts
discussion-comments = 25              # max discussion comments included in prompts
feature-issues = 4                     # max concurrent feature development issues
maintenance-issues = 2                 # max concurrent maintenance issues
attempts-per-branch = 5               # max transform attempts on a single branch
attempts-per-issue = 4                 # max transform attempts on a single issue
features-limit = 8                     # max feature files in features/ directory
library-limit = 64                     # max library entries in library/ directory

[bot]
log-file = "test/intentïon.md"                  #@dist "intentïon.md"
