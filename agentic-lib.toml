# agentic-lib.toml — Configuration for agentic-lib's own CI testing
#
# This file controls how agentic workflows operate on this repository.

[schedule]
tier = "schedule-1"

[paths]
mission = "MISSION.md"
source = "src/lib/"
tests = "tests/unit/"
features = ".github/agentic-lib/features/"
docs = "docs/"
readme = "README.md"
dependencies = "package.json"
contributing = "CONTRIBUTING.md"
library-sources = "SOURCES.md"

[execution]
build = "npm run build"
test = "npm test"
start = "npm run start"

[limits]
feature-issues = 2
maintenance-issues = 1
attempts-per-branch = 3
attempts-per-issue = 2
features-limit = 2

[bot]
log-file = "intentïon.md"
