# .github/workflows/test.yml
#
# All testing for agentic-lib in one workflow.
#
# Every push/PR runs 10 concurrent jobs:
#
#   CI (4 jobs — each fails independently for maximum signal):
#     lint               — ESLint
#     lint-workflows     — Validate all workflow YAML files
#     security           — npm audit
#     unit-tests         — Vitest suite
#   Action transforms (3 jobs — real Copilot SDK round-trips):
#     test-maintain-features  — Generates feature files from seed mission
#     test-maintain-library   — Crawls SOURCES.md and maintains library docs
#     test-transform          — Advances seed code toward mission
#   CLI transforms (3 jobs — real Copilot SDK round-trips via CLI):
#     test-cli-transform          — CLI transform
#     test-cli-maintain-features  — CLI maintain-features
#     test-cli-maintain-library   — CLI maintain-library
#
# COPILOT_GITHUB_TOKEN is required for all transform jobs.
# Transform jobs are skipped when the token is unavailable (e.g. Dependabot PRs).
#
# Use workflow_dispatch to override the model.

name: test
run-name: "test [${{ github.ref_name }}]"

on:
  push:
    branches:
      - main
      - claude/*
    paths:
      - "**/*.js"
      - "**/*.json"
      - "**/*.yml"
      - "**/*.sh"
      - "!_developers/**"
      - "!exports/**"
  pull_request:
    branches:
      - main
    paths:
      - "**/*.js"
      - "**/*.json"
      - "**/*.yml"
      - "**/*.sh"
      - "!_developers/**"
      - "!exports/**"
  workflow_dispatch:
    inputs:
      skipLinter:
        description: "Skip the ESLint linting job"
        type: boolean
        required: false
        default: true
      model:
        description: "Copilot SDK model for action smoke tests"
        type: choice
        required: false
        default: "gpt-5-mini"
        options:
          - gpt-5-mini
          - claude-sonnet-4
          - gpt-4.1

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  npmAuthOrganisation: "@xn-intenton-z2a"

jobs:
  # ─── Params: normalise inputs across all trigger types ─────────────

  params:
    runs-on: ubuntu-latest
    steps:
      - name: Normalise params
        id: normalise
        shell: bash
        run: |
          SKIP_LINTER='${{ inputs.skipLinter }}'
          echo "skipLinter=${SKIP_LINTER:-true}" >> $GITHUB_OUTPUT
          MODEL='${{ inputs.model }}'
          echo "model=${MODEL:-gpt-5-mini}" >> $GITHUB_OUTPUT
      - name: Check COPILOT_GITHUB_TOKEN availability
        id: secrets
        shell: bash
        env:
          HAS_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN != '' }}
        run: echo "hasCopilotToken=${HAS_TOKEN}" >> $GITHUB_OUTPUT
    outputs:
      skipLinter: ${{ steps.normalise.outputs.skipLinter }}
      model: ${{ steps.normalise.outputs.model }}
      hasCopilotToken: ${{ steps.secrets.outputs.hasCopilotToken }}

  # ─── CI: each check as its own job ─────────────────────────────────

  lint:
    needs: params
    if: needs.params.outputs.skipLinter != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"
      - name: Set up ~/.npmrc
        run: |
          echo "${{ env.npmAuthOrganisation }}:registry=https://npm.pkg.github.com" >> ~/.npmrc
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" >> ~/.npmrc
          echo "always-auth=true" >> ~/.npmrc
      - run: npm ci
      - run: npm run linting

  lint-workflows:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"
      - name: Set up ~/.npmrc
        run: |
          echo "${{ env.npmAuthOrganisation }}:registry=https://npm.pkg.github.com" >> ~/.npmrc
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" >> ~/.npmrc
          echo "always-auth=true" >> ~/.npmrc
      - run: npm ci
      - run: npm run lint:workflows

  security:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"
      - name: Set up ~/.npmrc
        run: |
          echo "${{ env.npmAuthOrganisation }}:registry=https://npm.pkg.github.com" >> ~/.npmrc
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" >> ~/.npmrc
          echo "always-auth=true" >> ~/.npmrc
      - run: npm ci
      - run: npm run security

  unit-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"
      - name: Set up ~/.npmrc
        run: |
          echo "${{ env.npmAuthOrganisation }}:registry=https://npm.pkg.github.com" >> ~/.npmrc
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" >> ~/.npmrc
          echo "always-auth=true" >> ~/.npmrc
      - run: npm ci
      - name: Install sub-project dependencies
        run: cd src/actions/agentic-step && npm ci
      - run: npm test

  # ─── Action transforms: real Copilot SDK round-trips ───────────────

  test-maintain-features:
    needs: params
    if: needs.params.outputs.hasCopilotToken == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      issues: write
      packages: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"
      - name: Set up ~/.npmrc
        run: |
          echo "${{ env.npmAuthOrganisation }}:registry=https://npm.pkg.github.com" >> ~/.npmrc
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" >> ~/.npmrc
          echo "always-auth=true" >> ~/.npmrc
      - run: npm ci
      - name: Install sub-project dependencies
        run: cd src/actions/agentic-step && npm ci

      - name: Snapshot baseline
        run: rsync -a --exclude=.git --exclude=node_modules . /tmp/baseline/

      - name: Self-init + seed
        run: |
          bash scripts/self-init.sh
          cp src/seeds/zero-MISSION.md MISSION.md
          mkdir -p features

      - name: Show init changes
        run: diff -rN --exclude=.git --exclude=node_modules /tmp/baseline . || true

      - name: Snapshot post-init
        run: rsync -a --exclude=.git --exclude=node_modules . /tmp/post-init/

      - name: Run agentic-step (maintain-features)
        uses: ./.github/agentic-lib/actions/agentic-step
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
        with:
          task: "maintain-features"
          config: tests/template/agentic-lib.toml
          model: ${{ needs.params.outputs.model }}

      - name: Show agent changes
        run: |
          OUTPUT=$(diff -rN --exclude=.git --exclude=node_modules /tmp/post-init . || true)
          echo "$OUTPUT"
          if [ -z "$OUTPUT" ]; then
            echo "ERROR: maintain-features produced no changes"
            exit 1
          fi

      - name: Re-init + seed
        run: |
          bash scripts/self-init.sh
          cp src/seeds/zero-MISSION.md MISSION.md
          mkdir -p features

      - name: Show re-init changes
        run: diff -rN --exclude=.git --exclude=node_modules /tmp/post-init . || true

  test-maintain-library:
    needs: params
    if: needs.params.outputs.hasCopilotToken == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      issues: write
      packages: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"
      - name: Set up ~/.npmrc
        run: |
          echo "${{ env.npmAuthOrganisation }}:registry=https://npm.pkg.github.com" >> ~/.npmrc
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" >> ~/.npmrc
          echo "always-auth=true" >> ~/.npmrc
      - run: npm ci
      - name: Install sub-project dependencies
        run: cd src/actions/agentic-step && npm ci

      - name: Snapshot baseline
        run: rsync -a --exclude=.git --exclude=node_modules . /tmp/baseline/

      - name: Self-init + seed
        run: |
          bash scripts/self-init.sh
          cp src/seeds/zero-MISSION.md MISSION.md
          mkdir -p library
          cat > SOURCES.md << 'SEED_EOF'
          # Library Sources

          - https://docs.github.com/en/actions/creating-actions/about-custom-actions
          - https://docs.github.com/en/rest/overview/resources-in-the-rest-api
          SEED_EOF

      - name: Show init changes
        run: diff -rN --exclude=.git --exclude=node_modules /tmp/baseline . || true

      - name: Snapshot post-init
        run: rsync -a --exclude=.git --exclude=node_modules . /tmp/post-init/

      - name: Run agentic-step (maintain-library)
        uses: ./.github/agentic-lib/actions/agentic-step
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
        with:
          task: "maintain-library"
          config: tests/template/agentic-lib.toml
          model: ${{ needs.params.outputs.model }}
          writable-paths: "library/"

      - name: Show agent changes
        run: |
          OUTPUT=$(diff -rN --exclude=.git --exclude=node_modules /tmp/post-init . || true)
          echo "$OUTPUT"
          if [ -z "$OUTPUT" ]; then
            echo "ERROR: maintain-library produced no changes"
            exit 1
          fi

      - name: Re-init + seed
        run: |
          bash scripts/self-init.sh
          cp src/seeds/zero-MISSION.md MISSION.md
          mkdir -p library
          cat > SOURCES.md << 'SEED_EOF'
          # Library Sources

          - https://docs.github.com/en/actions/creating-actions/about-custom-actions
          - https://docs.github.com/en/rest/overview/resources-in-the-rest-api
          SEED_EOF

      - name: Show re-init changes
        run: diff -rN --exclude=.git --exclude=node_modules /tmp/post-init . || true

  test-transform:
    needs: params
    if: needs.params.outputs.hasCopilotToken == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      issues: write
      packages: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"
      - name: Set up ~/.npmrc
        run: |
          echo "${{ env.npmAuthOrganisation }}:registry=https://npm.pkg.github.com" >> ~/.npmrc
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" >> ~/.npmrc
          echo "always-auth=true" >> ~/.npmrc
      - run: npm ci
      - name: Install sub-project dependencies
        run: cd src/actions/agentic-step && npm ci

      - name: Snapshot baseline
        run: rsync -a --exclude=.git --exclude=node_modules . /tmp/baseline/

      - name: Self-init + seed
        run: |
          bash scripts/self-init.sh
          mkdir -p src/lib tests/unit features
          cp src/seeds/zero-main.js src/lib/main.js
          cp src/seeds/zero-main.test.js tests/unit/main.test.js
          cp src/seeds/zero-MISSION.md MISSION.md
          cat > features/hello-world.md << 'SEED_EOF'
          # Feature: Hello World

          The main function should accept a name argument and print "Hello, <name>!" to stdout.
          When no name is provided, it should default to "World".
          SEED_EOF

      - name: Show init changes
        run: diff -rN --exclude=.git --exclude=node_modules /tmp/baseline . || true

      - name: Snapshot post-init
        run: rsync -a --exclude=.git --exclude=node_modules . /tmp/post-init/

      - name: Run agentic-step (transform)
        uses: ./.github/agentic-lib/actions/agentic-step
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
        with:
          task: "transform"
          config: tests/template/agentic-lib.toml
          model: ${{ needs.params.outputs.model }}
          writable-paths: "src/lib/;tests/unit/"
          test-command: "npm test"

      - name: Verify tests pass after transform
        run: npm test

      - name: Show agent changes
        run: |
          OUTPUT=$(diff -rN --exclude=.git --exclude=node_modules /tmp/post-init . || true)
          echo "$OUTPUT"
          if [ -z "$OUTPUT" ]; then
            echo "ERROR: transform produced no changes"
            exit 1
          fi

      - name: Re-init + seed
        run: |
          bash scripts/self-init.sh
          mkdir -p src/lib tests/unit features
          cp src/seeds/zero-main.js src/lib/main.js
          cp src/seeds/zero-main.test.js tests/unit/main.test.js
          cp src/seeds/zero-MISSION.md MISSION.md
          cat > features/hello-world.md << 'SEED_EOF'
          # Feature: Hello World

          The main function should accept a name argument and print "Hello, <name>!" to stdout.
          When no name is provided, it should default to "World".
          SEED_EOF

      - name: Show re-init changes
        run: diff -rN --exclude=.git --exclude=node_modules /tmp/post-init . || true

  # ─── CLI transforms: real Copilot SDK round-trips via CLI ──────────

  test-cli-transform:
    needs: params
    if: needs.params.outputs.hasCopilotToken == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      issues: write
      packages: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"
      - name: Set up ~/.npmrc
        run: |
          echo "${{ env.npmAuthOrganisation }}:registry=https://npm.pkg.github.com" >> ~/.npmrc
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" >> ~/.npmrc
          echo "always-auth=true" >> ~/.npmrc
      - run: npm ci
      - name: Install sub-project dependencies
        run: cd src/actions/agentic-step && npm ci

      - name: Snapshot baseline
        run: rsync -a --exclude=.git --exclude=node_modules . /tmp/baseline/

      - name: Seed workspace
        run: |
          mkdir -p src/lib tests/unit features
          cp src/seeds/zero-main.js src/lib/main.js
          cp src/seeds/zero-main.test.js tests/unit/main.test.js
          cp src/seeds/zero-MISSION.md MISSION.md
          cp tests/template/agentic-lib.toml agentic-lib.toml
          cat > features/hello-world.md << 'SEED_EOF'
          # Feature: Hello World

          The main function should accept a name argument and print "Hello, <name>!" to stdout.
          When no name is provided, it should default to "World".
          SEED_EOF

      - name: Show seed changes
        run: diff -rN --exclude=.git --exclude=node_modules /tmp/baseline . || true

      - name: Snapshot post-seed
        run: rsync -a --exclude=.git --exclude=node_modules . /tmp/post-seed/

      - name: "CLI: transform"
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
        run: node bin/agentic-lib.js transform --model ${{ needs.params.outputs.model }}

      - name: Verify tests pass after transform
        run: npm test

      - name: Show agent changes
        run: |
          OUTPUT=$(diff -rN --exclude=.git --exclude=node_modules /tmp/post-seed . || true)
          echo "$OUTPUT"
          if [ -z "$OUTPUT" ]; then
            echo "ERROR: transform produced no changes"
            exit 1
          fi

      - name: Re-seed workspace
        run: |
          mkdir -p src/lib tests/unit features
          cp src/seeds/zero-main.js src/lib/main.js
          cp src/seeds/zero-main.test.js tests/unit/main.test.js
          cp src/seeds/zero-MISSION.md MISSION.md
          cat > features/hello-world.md << 'SEED_EOF'
          # Feature: Hello World

          The main function should accept a name argument and print "Hello, <name>!" to stdout.
          When no name is provided, it should default to "World".
          SEED_EOF

      - name: Show re-seed changes
        run: diff -rN --exclude=.git --exclude=node_modules /tmp/post-seed . || true

  test-cli-maintain-features:
    needs: params
    if: needs.params.outputs.hasCopilotToken == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      issues: write
      packages: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"
      - name: Set up ~/.npmrc
        run: |
          echo "${{ env.npmAuthOrganisation }}:registry=https://npm.pkg.github.com" >> ~/.npmrc
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" >> ~/.npmrc
          echo "always-auth=true" >> ~/.npmrc
      - run: npm ci
      - name: Install sub-project dependencies
        run: cd src/actions/agentic-step && npm ci

      - name: Snapshot baseline
        run: rsync -a --exclude=.git --exclude=node_modules . /tmp/baseline/

      - name: Seed workspace
        run: |
          cp src/seeds/zero-MISSION.md MISSION.md
          cp tests/template/agentic-lib.toml agentic-lib.toml
          mkdir -p features

      - name: Show seed changes
        run: diff -rN --exclude=.git --exclude=node_modules /tmp/baseline . || true

      - name: Snapshot post-seed
        run: rsync -a --exclude=.git --exclude=node_modules . /tmp/post-seed/

      - name: "CLI: maintain-features"
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
        run: node bin/agentic-lib.js maintain-features --model ${{ needs.params.outputs.model }}

      - name: Show agent changes
        run: |
          OUTPUT=$(diff -rN --exclude=.git --exclude=node_modules /tmp/post-seed . || true)
          echo "$OUTPUT"
          if [ -z "$OUTPUT" ]; then
            echo "ERROR: maintain-features produced no changes"
            exit 1
          fi

      - name: Re-seed workspace
        run: |
          cp src/seeds/zero-MISSION.md MISSION.md
          mkdir -p features

      - name: Show re-seed changes
        run: diff -rN --exclude=.git --exclude=node_modules /tmp/post-seed . || true

  test-cli-maintain-library:
    needs: params
    if: needs.params.outputs.hasCopilotToken == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      issues: write
      packages: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"
      - name: Set up ~/.npmrc
        run: |
          echo "${{ env.npmAuthOrganisation }}:registry=https://npm.pkg.github.com" >> ~/.npmrc
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" >> ~/.npmrc
          echo "always-auth=true" >> ~/.npmrc
      - run: npm ci
      - name: Install sub-project dependencies
        run: cd src/actions/agentic-step && npm ci

      - name: Snapshot baseline
        run: rsync -a --exclude=.git --exclude=node_modules . /tmp/baseline/

      - name: Seed workspace
        run: |
          cp src/seeds/zero-MISSION.md MISSION.md
          cp tests/template/agentic-lib.toml agentic-lib.toml
          mkdir -p docs
          cat > SOURCES.md << 'SEED_EOF'
          # Library Sources

          - https://docs.github.com/en/actions/creating-actions/about-custom-actions
          - https://docs.github.com/en/rest/overview/resources-in-the-rest-api
          SEED_EOF

      - name: Show seed changes
        run: diff -rN --exclude=.git --exclude=node_modules /tmp/baseline . || true

      - name: Snapshot post-seed
        run: rsync -a --exclude=.git --exclude=node_modules . /tmp/post-seed/

      - name: "CLI: maintain-library"
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
        run: node bin/agentic-lib.js maintain-library --model ${{ needs.params.outputs.model }}

      - name: Show agent changes
        run: |
          OUTPUT=$(diff -rN --exclude=.git --exclude=node_modules /tmp/post-seed . || true)
          echo "$OUTPUT"
          if [ -z "$OUTPUT" ]; then
            echo "ERROR: maintain-library produced no changes"
            exit 1
          fi

      - name: Re-seed workspace
        run: |
          cp src/seeds/zero-MISSION.md MISSION.md
          mkdir -p docs
          cat > SOURCES.md << 'SEED_EOF'
          # Library Sources

          - https://docs.github.com/en/actions/creating-actions/about-custom-actions
          - https://docs.github.com/en/rest/overview/resources-in-the-rest-api
          SEED_EOF

      - name: Show re-seed changes
        run: diff -rN --exclude=.git --exclude=node_modules /tmp/post-seed . || true
