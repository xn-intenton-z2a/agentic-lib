# .github/workflows/test.yml
#
# All testing for agentic-lib in one workflow.
#
# Every push/PR runs 10 concurrent jobs:
#
#   CI (4 jobs — each fails independently for maximum signal):
#     lint               — ESLint
#     lint-workflows     — Validate all workflow YAML files
#     security           — npm audit
#     unit-tests         — Vitest suite
#   Action transforms (3 jobs — real Copilot SDK round-trips):
#     test-maintain-features  — Generates feature files from seed mission
#     test-maintain-library   — Crawls SOURCES.md and maintains library docs
#     test-transform          — Advances seed code toward mission
#   CLI transforms (3 jobs — real Copilot SDK round-trips via CLI):
#     test-cli-transform          — CLI transform
#     test-cli-maintain-features  — CLI maintain-features
#     test-cli-maintain-library   — CLI maintain-library
#
# COPILOT_GITHUB_TOKEN is required for all transform jobs.
#
# Use workflow_dispatch to override the model.

name: test
run-name: "test [${{ github.ref_name }}]"

on:
  push:
    branches:
      - main
      - claude/*
    paths:
      - "**/*.js"
      - "**/*.json"
      - "**/*.yml"
      - "**/*.sh"
      - "!_developers/**"
      - "!exports/**"
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      model:
        description: "Copilot SDK model for action smoke tests"
        type: choice
        required: false
        default: "gpt-5-mini"
        options:
          - gpt-5-mini
          - claude-sonnet-4
          - gpt-4.1

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  npmAuthOrganisation: "@xn-intenton-z2a"

jobs:
  # ─── CI: each check as its own job ─────────────────────────────────

  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"
      - name: Set up ~/.npmrc
        run: |
          echo "${{ env.npmAuthOrganisation }}:registry=https://npm.pkg.github.com" >> ~/.npmrc
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" >> ~/.npmrc
          echo "always-auth=true" >> ~/.npmrc
      - run: npm ci
      - run: npm run linting

  lint-workflows:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"
      - name: Set up ~/.npmrc
        run: |
          echo "${{ env.npmAuthOrganisation }}:registry=https://npm.pkg.github.com" >> ~/.npmrc
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" >> ~/.npmrc
          echo "always-auth=true" >> ~/.npmrc
      - run: npm ci
      - run: npm run lint:workflows

  security:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"
      - name: Set up ~/.npmrc
        run: |
          echo "${{ env.npmAuthOrganisation }}:registry=https://npm.pkg.github.com" >> ~/.npmrc
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" >> ~/.npmrc
          echo "always-auth=true" >> ~/.npmrc
      - run: npm ci
      - run: npm run security

  unit-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"
      - name: Set up ~/.npmrc
        run: |
          echo "${{ env.npmAuthOrganisation }}:registry=https://npm.pkg.github.com" >> ~/.npmrc
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" >> ~/.npmrc
          echo "always-auth=true" >> ~/.npmrc
      - run: npm ci
      - name: Install sub-project dependencies
        run: cd src/actions/agentic-step && npm ci
      - run: npm test

  # ─── Action transforms: real Copilot SDK round-trips ───────────────

  test-maintain-features:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      issues: write
      packages: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"
      - name: Set up ~/.npmrc
        run: |
          echo "${{ env.npmAuthOrganisation }}:registry=https://npm.pkg.github.com" >> ~/.npmrc
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" >> ~/.npmrc
          echo "always-auth=true" >> ~/.npmrc
      - run: npm ci
      - name: Install sub-project dependencies
        run: cd src/actions/agentic-step && npm ci

      - name: Self-init
        run: bash scripts/self-init.sh

      - name: Seed workspace
        run: |
          cp src/seeds/zero-MISSION.md MISSION.md
          mkdir -p .github/agentic-lib/features

      - name: Run agentic-step (maintain-features)
        uses: ./.github/agentic-lib/actions/agentic-step
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
        with:
          task: "maintain-features"
          config: agentic-lib.toml
          model: ${{ inputs.model || 'gpt-5-mini' }}

      - name: Verify transform produced output
        run: |
          git add -N .
          echo "## maintain-features results" | tee -a $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          git diff --stat | tee -a $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo '```diff' >> $GITHUB_STEP_SUMMARY
          git diff | tee -a $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          if [ "$(find .github/agentic-lib/features -name '*.md' | wc -l)" -eq 0 ]; then
            echo "ERROR: maintain-features produced no feature files"
            exit 1
          fi

  test-maintain-library:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      issues: write
      packages: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"
      - name: Set up ~/.npmrc
        run: |
          echo "${{ env.npmAuthOrganisation }}:registry=https://npm.pkg.github.com" >> ~/.npmrc
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" >> ~/.npmrc
          echo "always-auth=true" >> ~/.npmrc
      - run: npm ci
      - name: Install sub-project dependencies
        run: cd src/actions/agentic-step && npm ci

      - name: Self-init
        run: bash scripts/self-init.sh

      - name: Seed workspace
        run: |
          cp src/seeds/zero-MISSION.md MISSION.md
          mkdir -p library
          cat > SOURCES.md << 'SEED_EOF'
          # Library Sources

          - https://docs.github.com/en/actions/creating-actions/about-custom-actions
          - https://docs.github.com/en/rest/overview/resources-in-the-rest-api
          SEED_EOF

      - name: Run agentic-step (maintain-library)
        uses: ./.github/agentic-lib/actions/agentic-step
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
        with:
          task: "maintain-library"
          config: agentic-lib.toml
          model: ${{ inputs.model || 'gpt-5-mini' }}
          writable-paths: "library/"

      - name: Verify transform produced output
        run: |
          git add -N .
          echo "## maintain-library results" | tee -a $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          git diff --stat | tee -a $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo '```diff' >> $GITHUB_STEP_SUMMARY
          git diff | tee -a $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          if [ "$(find library -name '*.md' | wc -l)" -eq 0 ]; then
            echo "ERROR: maintain-library produced no library documents"
            exit 1
          fi

  test-transform:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      issues: write
      packages: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"
      - name: Set up ~/.npmrc
        run: |
          echo "${{ env.npmAuthOrganisation }}:registry=https://npm.pkg.github.com" >> ~/.npmrc
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" >> ~/.npmrc
          echo "always-auth=true" >> ~/.npmrc
      - run: npm ci
      - name: Install sub-project dependencies
        run: cd src/actions/agentic-step && npm ci

      - name: Self-init
        run: bash scripts/self-init.sh

      - name: Seed workspace
        run: |
          mkdir -p src/lib tests/unit .github/agentic-lib/features
          cp src/seeds/zero-main.js src/lib/main.js
          cp src/seeds/zero-main.test.js tests/unit/main.test.js
          cp src/seeds/zero-MISSION.md MISSION.md
          cat > .github/agentic-lib/features/hello-world.md << 'SEED_EOF'
          # Feature: Hello World

          The main function should accept a name argument and print "Hello, <name>!" to stdout.
          When no name is provided, it should default to "World".
          SEED_EOF

      - name: Run agentic-step (transform)
        uses: ./.github/agentic-lib/actions/agentic-step
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
        with:
          task: "transform"
          config: agentic-lib.toml
          model: ${{ inputs.model || 'gpt-5-mini' }}
          writable-paths: "src/lib/;tests/unit/"
          test-command: "npm test"

      - name: Verify tests pass after transform
        run: npm test

      - name: Show results
        run: |
          git add -N .
          echo "## transform results" | tee -a $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          git diff --stat | tee -a $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo '```diff' >> $GITHUB_STEP_SUMMARY
          git diff | tee -a $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  # ─── CLI transforms: real Copilot SDK round-trips via CLI ──────────

  test-cli-transform:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      issues: write
      packages: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"
      - name: Set up ~/.npmrc
        run: |
          echo "${{ env.npmAuthOrganisation }}:registry=https://npm.pkg.github.com" >> ~/.npmrc
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" >> ~/.npmrc
          echo "always-auth=true" >> ~/.npmrc
      - run: npm ci
      - name: Install sub-project dependencies
        run: cd src/actions/agentic-step && npm ci

      - name: Seed workspace
        run: |
          mkdir -p src/lib tests/unit .github/agentic-lib/features
          cp src/seeds/zero-main.js src/lib/main.js
          cp src/seeds/zero-main.test.js tests/unit/main.test.js
          cp src/seeds/zero-MISSION.md MISSION.md
          cat > .github/agentic-lib/features/hello-world.md << 'SEED_EOF'
          # Feature: Hello World

          The main function should accept a name argument and print "Hello, <name>!" to stdout.
          When no name is provided, it should default to "World".
          SEED_EOF

      - name: "CLI: transform"
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
        run: node bin/agentic-lib.js transform --model ${{ inputs.model || 'gpt-5-mini' }}

      - name: Verify tests pass after transform
        run: npm test

      - name: Show results
        run: |
          git add -N .
          echo "## CLI transform results" | tee -a $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          git diff --stat | tee -a $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo '```diff' >> $GITHUB_STEP_SUMMARY
          git diff | tee -a $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  test-cli-maintain-features:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      issues: write
      packages: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"
      - name: Set up ~/.npmrc
        run: |
          echo "${{ env.npmAuthOrganisation }}:registry=https://npm.pkg.github.com" >> ~/.npmrc
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" >> ~/.npmrc
          echo "always-auth=true" >> ~/.npmrc
      - run: npm ci
      - name: Install sub-project dependencies
        run: cd src/actions/agentic-step && npm ci

      - name: Seed workspace
        run: |
          cp src/seeds/zero-MISSION.md MISSION.md
          mkdir -p .github/agentic-lib/features

      - name: "CLI: maintain-features"
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
        run: node bin/agentic-lib.js maintain-features --model ${{ inputs.model || 'gpt-5-mini' }}

      - name: Verify transform produced output
        run: |
          git add -N .
          echo "## CLI maintain-features results" | tee -a $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          git diff --stat | tee -a $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo '```diff' >> $GITHUB_STEP_SUMMARY
          git diff | tee -a $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          if [ "$(find .github/agentic-lib/features -name '*.md' | wc -l)" -eq 0 ]; then
            echo "ERROR: maintain-features produced no feature files"
            exit 1
          fi

  test-cli-maintain-library:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      issues: write
      packages: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"
      - name: Set up ~/.npmrc
        run: |
          echo "${{ env.npmAuthOrganisation }}:registry=https://npm.pkg.github.com" >> ~/.npmrc
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" >> ~/.npmrc
          echo "always-auth=true" >> ~/.npmrc
      - run: npm ci
      - name: Install sub-project dependencies
        run: cd src/actions/agentic-step && npm ci

      - name: Seed workspace
        run: |
          cp src/seeds/zero-MISSION.md MISSION.md
          mkdir -p docs
          cat > SOURCES.md << 'SEED_EOF'
          # Library Sources

          - https://docs.github.com/en/actions/creating-actions/about-custom-actions
          - https://docs.github.com/en/rest/overview/resources-in-the-rest-api
          SEED_EOF

      - name: "CLI: maintain-library"
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
        run: node bin/agentic-lib.js maintain-library --model ${{ inputs.model || 'gpt-5-mini' }}

      - name: Verify transform produced output
        run: |
          git add -N .
          echo "## CLI maintain-library results" | tee -a $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          git diff --stat | tee -a $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo '```diff' >> $GITHUB_STEP_SUMMARY
          git diff | tee -a $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          if [ "$(find docs -name '*.md' | wc -l)" -eq 0 ]; then
            echo "ERROR: maintain-library produced no library documents"
            exit 1
          fi
