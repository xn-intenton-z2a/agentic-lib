# .github/workflows/test.yml
#
# All testing for agentic-lib in one workflow.
#
# Every push/PR runs 7 concurrent jobs:
#
#   CI (4 jobs — each fails independently for maximum signal):
#     lint               — ESLint
#     lint-workflows     — Validate all workflow YAML files
#     security           — npm audit
#     unit-tests         — Vitest suite
#   Action transforms (3 jobs — real Copilot SDK round-trips):
#     test-maintain-features  — Generates feature files from seed mission
#     test-maintain-library   — Crawls SOURCES.md and maintains library docs
#     test-transform          — Advances seed code toward mission
#
# COPILOT_GITHUB_TOKEN is required for transform jobs.
#
# Use workflow_dispatch to override the model.

name: test
run-name: "test [${{ github.ref_name }}]"

on:
  push:
    branches:
      - main
      - claude/*
    paths:
      - "**/*.js"
      - "**/*.json"
      - "**/*.yml"
      - "**/*.sh"
      - "!_developers/**"
      - "!exports/**"
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      model:
        description: "Copilot SDK model for action smoke tests"
        type: choice
        required: false
        default: "gpt-5-mini"
        options:
          - gpt-5-mini
          - claude-sonnet-4
          - gpt-4.1

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  npmAuthOrganisation: "@xn-intenton-z2a"

jobs:
  # ─── CI: each check as its own job ─────────────────────────────────

  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"
      - name: Set up ~/.npmrc
        run: |
          echo "${{ env.npmAuthOrganisation }}:registry=https://npm.pkg.github.com" >> ~/.npmrc
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" >> ~/.npmrc
          echo "always-auth=true" >> ~/.npmrc
      - run: npm ci
      - run: npm run linting

  lint-workflows:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"
      - name: Set up ~/.npmrc
        run: |
          echo "${{ env.npmAuthOrganisation }}:registry=https://npm.pkg.github.com" >> ~/.npmrc
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" >> ~/.npmrc
          echo "always-auth=true" >> ~/.npmrc
      - run: npm ci
      - run: npm run lint:workflows

  security:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"
      - name: Set up ~/.npmrc
        run: |
          echo "${{ env.npmAuthOrganisation }}:registry=https://npm.pkg.github.com" >> ~/.npmrc
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" >> ~/.npmrc
          echo "always-auth=true" >> ~/.npmrc
      - run: npm ci
      - run: npm run security

  unit-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"
      - name: Set up ~/.npmrc
        run: |
          echo "${{ env.npmAuthOrganisation }}:registry=https://npm.pkg.github.com" >> ~/.npmrc
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" >> ~/.npmrc
          echo "always-auth=true" >> ~/.npmrc
      - run: npm ci
      - name: Install sub-project dependencies
        run: cd src/actions/agentic-step && (npm ci)
      - run: npm test

  # ─── Action transforms: real Copilot SDK round-trips ───────────────

  test-maintain-features:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      issues: write
      packages: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"
      - name: Set up ~/.npmrc
        run: |
          echo "${{ env.npmAuthOrganisation }}:registry=https://npm.pkg.github.com" >> ~/.npmrc
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" >> ~/.npmrc
          echo "always-auth=true" >> ~/.npmrc

      - name: Self-init
        run: bash scripts/self-init.sh

      - name: Seed workspace
        run: |
          cp src/seeds/zero-MISSION.md MISSION.md
          mkdir -p .github/agentic-lib/features

      - name: "Diff: seed state"
        run: |
          echo "## Seed state (maintain-features)" >> $GITHUB_STEP_SUMMARY
          echo '```diff' >> $GITHUB_STEP_SUMMARY
          git diff --stat >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          git diff --stat
          echo "---"
          git diff

      - name: Run agentic-step (maintain-features)
        uses: ./.github/agentic-lib/actions/agentic-step
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
        with:
          task: "maintain-features"
          config: agentic-lib.toml
          model: ${{ inputs.model || 'gpt-5-mini' }}

      - name: "Diff: after transform"
        run: |
          echo "## After maintain-features" >> $GITHUB_STEP_SUMMARY
          echo '```diff' >> $GITHUB_STEP_SUMMARY
          git diff --stat >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "--- Features created ---"
          find .github/agentic-lib/features -name "*.md" 2>/dev/null || echo "(none)"
          echo "--- Full diff ---"
          git diff --stat
          echo "---"
          git diff

      - name: Reset to seed
        run: |
          git checkout -- .
          git clean -fd .github/agentic-lib/features/
          mkdir -p .github/agentic-lib/features
          cp src/seeds/zero-MISSION.md MISSION.md

      - name: "Diff: after reset (should be clean)"
        run: |
          echo "## After reset" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          git diff --stat >> $GITHUB_STEP_SUMMARY || echo "(clean)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          git diff --stat || echo "(clean)"

  test-maintain-library:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      issues: write
      packages: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"
      - name: Set up ~/.npmrc
        run: |
          echo "${{ env.npmAuthOrganisation }}:registry=https://npm.pkg.github.com" >> ~/.npmrc
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" >> ~/.npmrc
          echo "always-auth=true" >> ~/.npmrc

      - name: Self-init
        run: bash scripts/self-init.sh

      - name: Seed workspace
        run: |
          cp src/seeds/zero-MISSION.md MISSION.md
          mkdir -p library
          cat > SOURCES.md << 'SEED_EOF'
          # Library Sources

          - https://docs.github.com/en/actions/creating-actions/about-custom-actions
          - https://docs.github.com/en/rest/overview/resources-in-the-rest-api
          SEED_EOF

      - name: "Diff: seed state"
        run: |
          echo "## Seed state (maintain-library)" >> $GITHUB_STEP_SUMMARY
          echo '```diff' >> $GITHUB_STEP_SUMMARY
          git diff --stat >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          git diff --stat
          echo "---"
          git diff

      - name: Run agentic-step (maintain-library)
        uses: ./.github/agentic-lib/actions/agentic-step
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
        with:
          task: "maintain-library"
          config: agentic-lib.toml
          model: ${{ inputs.model || 'gpt-5-mini' }}
          writable-paths: "library/"

      - name: "Diff: after transform"
        run: |
          echo "## After maintain-library" >> $GITHUB_STEP_SUMMARY
          echo '```diff' >> $GITHUB_STEP_SUMMARY
          git diff --stat >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "--- Library documents ---"
          find library -name "*.md" 2>/dev/null || echo "(none)"
          echo "--- Full diff ---"
          git diff --stat
          echo "---"
          git diff

      - name: Reset to seed
        run: |
          git checkout -- .
          git clean -fd library/
          rm -f SOURCES.md MISSION.md

      - name: "Diff: after reset (should be clean)"
        run: |
          echo "## After reset" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          git diff --stat >> $GITHUB_STEP_SUMMARY || echo "(clean)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          git diff --stat || echo "(clean)"

  test-transform:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      issues: write
      packages: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"
      - name: Set up ~/.npmrc
        run: |
          echo "${{ env.npmAuthOrganisation }}:registry=https://npm.pkg.github.com" >> ~/.npmrc
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" >> ~/.npmrc
          echo "always-auth=true" >> ~/.npmrc

      - name: Self-init
        run: bash scripts/self-init.sh

      - name: Seed workspace
        run: |
          mkdir -p src/lib tests/unit .github/agentic-lib/features
          cp src/seeds/zero-main.js src/lib/main.js
          cp src/seeds/zero-main.test.js tests/unit/main.test.js
          cp src/seeds/zero-MISSION.md MISSION.md
          cat > .github/agentic-lib/features/hello-world.md << 'SEED_EOF'
          # Feature: Hello World

          The main function should accept a name argument and print "Hello, <name>!" to stdout.
          When no name is provided, it should default to "World".
          SEED_EOF

      - name: "Diff: seed state"
        run: |
          echo "## Seed state (transform)" >> $GITHUB_STEP_SUMMARY
          echo '```diff' >> $GITHUB_STEP_SUMMARY
          git diff --stat >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          git diff --stat
          echo "---"
          git diff

      - name: Run agentic-step (transform)
        uses: ./.github/agentic-lib/actions/agentic-step
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
        with:
          task: "transform"
          config: agentic-lib.toml
          model: ${{ inputs.model || 'gpt-5-mini' }}
          writable-paths: "src/lib/;tests/unit/"
          test-command: "npm test"

      - name: "Diff: after transform"
        run: |
          echo "## After transform" >> $GITHUB_STEP_SUMMARY
          echo '```diff' >> $GITHUB_STEP_SUMMARY
          git diff --stat >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "--- src/lib/main.js ---"
          cat src/lib/main.js
          echo "--- tests/unit/main.test.js ---"
          cat tests/unit/main.test.js
          echo "--- Full diff ---"
          git diff --stat
          echo "---"
          git diff

      - name: Reset to seed
        run: |
          git checkout -- .
          git clean -fd src/lib/ tests/unit/ .github/agentic-lib/features/
          mkdir -p src/lib tests/unit .github/agentic-lib/features
          cp src/seeds/zero-main.js src/lib/main.js
          cp src/seeds/zero-main.test.js tests/unit/main.test.js
          cp src/seeds/zero-MISSION.md MISSION.md

      - name: "Diff: after reset (should be clean)"
        run: |
          echo "## After reset" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          git diff --stat >> $GITHUB_STEP_SUMMARY || echo "(clean)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          git diff --stat || echo "(clean)"
