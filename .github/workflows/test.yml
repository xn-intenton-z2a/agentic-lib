# .github/workflows/test.yml
#
# All testing for agentic-lib in one workflow.
#
# Every push/PR runs 3 jobs:
#   ci             — lint, security, workflow validation, unit tests, golden prompt drift
#   action-smoke   — real Copilot SDK round-trip (maintain-features + transform) using gpt-5-mini
#   verify         — gate: checks ci passed
#
# The action-smoke job uses continue-on-error (COPILOT_GITHUB_TOKEN may not be available).
# Use workflow_dispatch to override the model.

name: test
run-name: "test [${{ github.ref_name }}]"

on:
  push:
    branches:
      - main
      - claude/*
    paths:
      - "**/*.js"
      - "**/*.json"
      - "**/*.yml"
      - "**/*.sh"
      - "!_developers/**"
      - "!exports/**"
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      model:
        description: "Copilot SDK model for action smoke tests"
        type: choice
        required: false
        default: "gpt-5-mini"
        options:
          - gpt-5-mini
          - claude-sonnet-4
          - gpt-4.1

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  npmAuthOrganisation: "@xn-intenton-z2a"

jobs:
  # ─── CI: all free checks in one job ──────────────────────────────────

  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"

      - name: Set up ~/.npmrc
        shell: bash
        run: |
          echo "${{ env.npmAuthOrganisation }}:registry=https://npm.pkg.github.com" >> ~/.npmrc
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.PERSONAL_ACCESS_TOKEN || secrets.GITHUB_TOKEN }}" >> ~/.npmrc
          echo "always-auth=true" >> ~/.npmrc

      - run: npm ci || npm install

      - name: Install sub-project dependencies
        run: cd src/actions/agentic-step && (npm ci || npm install)

      - name: Lint
        run: npm run linting

      - name: Validate workflows
        run: npm run lint:workflows

      - name: Security audit
        run: npm run security

      - name: Unit tests
        run: npm test

      - name: Golden prompt drift check
        run: |
          npm run test:record-golden
          if git diff --quiet tests/fixtures/golden-prompts/; then
            echo "Golden prompts are up to date"
          else
            echo "Golden prompts have drifted:"
            git diff tests/fixtures/golden-prompts/
            exit 1
          fi

  # ─── Action Smoke: real Copilot SDK round-trip ───────────────────────

  action-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    permissions:
      contents: write
      issues: write
      packages: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"

      - name: Set up ~/.npmrc
        shell: bash
        run: |
          echo "${{ env.npmAuthOrganisation }}:registry=https://npm.pkg.github.com" >> ~/.npmrc
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.PERSONAL_ACCESS_TOKEN || secrets.GITHUB_TOKEN }}" >> ~/.npmrc
          echo "always-auth=true" >> ~/.npmrc

      - name: Self-init
        run: bash scripts/self-init.sh

      - name: Seed workspace
        run: |
          mkdir -p src/lib tests/unit .github/agentic-lib/features
          cp src/seeds/zero-main.js src/lib/main.js
          cp src/seeds/zero-main.test.js tests/unit/main.test.js
          cp src/seeds/zero-MISSION.md MISSION.md

      - name: Record seed state
        id: seed
        run: |
          SEED_HASH=$(sha256sum src/lib/main.js | cut -d' ' -f1)
          echo "hash=${SEED_HASH}" >> $GITHUB_OUTPUT
          FEATURES_BEFORE=$(find .github/agentic-lib/features -name "*.md" 2>/dev/null | wc -l)
          echo "features=${FEATURES_BEFORE}" >> $GITHUB_OUTPUT

      # Step 1: maintain-features — generates feature files from the seed mission
      - name: Run agentic-step (maintain-features)
        uses: ./.github/agentic-lib/actions/agentic-step
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
        with:
          task: "maintain-features"
          config: .github/agentic-lib/agents/agentic-lib.yml
          model: ${{ inputs.model || 'gpt-5-mini' }}

      - name: Verify maintain-features
        run: |
          FEATURES_AFTER=$(find .github/agentic-lib/features -name "*.md" 2>/dev/null | wc -l)
          FEATURES_BEFORE="${{ steps.seed.outputs.features }}"
          if [ "$FEATURES_AFTER" -gt "$FEATURES_BEFORE" ]; then
            echo "PASS: maintain-features created $((FEATURES_AFTER - FEATURES_BEFORE)) feature(s)"
            ls .github/agentic-lib/features/*.md
          else
            echo "INFO: No features created (Copilot SDK may not be available)"
          fi

      # Step 2: transform — advances code toward the mission
      - name: Run agentic-step (transform)
        uses: ./.github/agentic-lib/actions/agentic-step
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
        with:
          task: "transform"
          config: .github/agentic-lib/agents/agentic-lib.yml
          model: ${{ inputs.model || 'gpt-5-mini' }}
          writable-paths: "src/lib/;tests/unit/"
          test-command: "npm test"

      - name: Verify transform
        run: |
          CURRENT_HASH=$(sha256sum src/lib/main.js | cut -d' ' -f1)
          SEED_HASH="${{ steps.seed.outputs.hash }}"
          if [ "$CURRENT_HASH" != "$SEED_HASH" ]; then
            echo "PASS: src/lib/main.js was modified by the transform"
            wc -c src/lib/main.js
          else
            echo "INFO: src/lib/main.js was NOT modified (Copilot SDK may not be available)"
          fi

  # ─── Verification Gate ──────────────────────────────────────────────

  verify:
    needs: [ci, action-smoke]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Summary
        run: |
          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| CI (lint + tests + security) | ${{ needs.ci.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Action smoke (SDK round-trip) | ${{ needs.action-smoke.result }} |" >> $GITHUB_STEP_SUMMARY

      - name: Check CI passed
        run: |
          if [ "${{ needs.ci.result }}" != "success" ]; then
            echo "FAIL: CI did not pass"
            exit 1
          fi
          echo "CI passed"
          if [ "${{ needs.action-smoke.result }}" = "success" ]; then
            echo "Action smoke passed"
          else
            echo "Action smoke: ${{ needs.action-smoke.result }} (non-blocking)"
          fi
