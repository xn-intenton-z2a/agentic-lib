# .github/workflows/integration-test-discussions.yml
#
# Pre-publish validation: discussions bot end-to-end test.
# Posts a comment to a repository0 discussion, waits for the bot to process it,
# and verifies the workflow completed successfully.
#
# Requires: PERSONAL_ACCESS_TOKEN secret with cross-repo write access.
# The target repo must have agent-discussions-bot.yml installed and
# COPILOT_GITHUB_TOKEN secret configured.

name: integration-test-discussions
run-name: "integration-test-discussions [${{ github.ref_name }}]"

on:
  workflow_dispatch:
    inputs:
      target-repo:
        description: "Repository to test against (owner/repo)"
        type: string
        default: "xn-intenton-z2a/repository0"
      discussion-number:
        description: "Discussion number to post test comment to"
        type: string
        default: "2401"
      timeout-minutes:
        description: "Max minutes to wait for bot workflow"
        type: string
        default: "10"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test-discussions-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Parse target repo
        id: repo
        run: |
          FULL="${{ inputs.target-repo || 'xn-intenton-z2a/repository0' }}"
          OWNER="${FULL%%/*}"
          REPO="${FULL##*/}"
          echo "owner=${OWNER}" >> $GITHUB_OUTPUT
          echo "repo=${REPO}" >> $GITHUB_OUTPUT
          echo "full=${FULL}" >> $GITHUB_OUTPUT

      - name: Get discussion node ID
        id: discussion
        env:
          GH_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        run: |
          NUMBER="${{ inputs.discussion-number || '2401' }}"
          OWNER="${{ steps.repo.outputs.owner }}"
          REPO="${{ steps.repo.outputs.repo }}"

          DISCUSSION_ID=$(gh api graphql -f query="
            query {
              repository(owner: \"${OWNER}\", name: \"${REPO}\") {
                discussion(number: ${NUMBER}) {
                  id
                  title
                }
              }
            }
          " --jq '.data.repository.discussion.id')

          TITLE=$(gh api graphql -f query="
            query {
              repository(owner: \"${OWNER}\", name: \"${REPO}\") {
                discussion(number: ${NUMBER}) {
                  title
                }
              }
            }
          " --jq '.data.repository.discussion.title')

          echo "discussionId=${DISCUSSION_ID}" >> $GITHUB_OUTPUT
          echo "Discussion #${NUMBER}: ${TITLE} (${DISCUSSION_ID})"

      - name: Record pre-test state
        id: baseline
        env:
          GH_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        run: |
          OWNER="${{ steps.repo.outputs.owner }}"
          REPO="${{ steps.repo.outputs.repo }}"

          # Count current workflow runs for the bot
          RUNS_BEFORE=$(gh run list \
            --repo "${OWNER}/${REPO}" \
            --workflow=agent-discussions-bot.yml \
            --limit=1 \
            --json databaseId \
            --jq '.[0].databaseId // 0')
          echo "lastRunId=${RUNS_BEFORE}" >> $GITHUB_OUTPUT
          echo "Last bot workflow run ID: ${RUNS_BEFORE}"

      - name: Post test comment to discussion
        id: post
        env:
          GH_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        run: |
          DISCUSSION_ID="${{ steps.discussion.outputs.discussionId }}"
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

          TEST_BODY="[INTEGRATION-TEST] ${TIMESTAMP}

          This is an automated integration test from agentic-lib CI.
          Run: ${RUN_URL}

          Please respond with your current status. What features are available?"

          RESULT=$(gh api graphql -f query='
            mutation($id: ID!, $body: String!) {
              addDiscussionComment(input: {discussionId: $id, body: $body}) {
                comment { id url }
              }
            }
          ' -f id="${DISCUSSION_ID}" -f body="${TEST_BODY}")

          COMMENT_ID=$(echo "$RESULT" | jq -r '.data.addDiscussionComment.comment.id')
          COMMENT_URL=$(echo "$RESULT" | jq -r '.data.addDiscussionComment.comment.url')

          echo "commentId=${COMMENT_ID}" >> $GITHUB_OUTPUT
          echo "commentUrl=${COMMENT_URL}" >> $GITHUB_OUTPUT
          echo "Posted test comment: ${COMMENT_URL}"

      - name: Wait for discussions bot workflow to start
        env:
          GH_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        run: |
          OWNER="${{ steps.repo.outputs.owner }}"
          REPO="${{ steps.repo.outputs.repo }}"
          LAST_RUN="${{ steps.baseline.outputs.lastRunId }}"
          MAX_WAIT=120
          ELAPSED=0

          echo "Waiting for a new bot workflow run (after run ID ${LAST_RUN})..."

          while [ $ELAPSED -lt $MAX_WAIT ]; do
            LATEST_ID=$(gh run list \
              --repo "${OWNER}/${REPO}" \
              --workflow=agent-discussions-bot.yml \
              --limit=1 \
              --json databaseId \
              --jq '.[0].databaseId // 0')

            if [ "$LATEST_ID" != "$LAST_RUN" ] && [ "$LATEST_ID" != "0" ]; then
              echo "New workflow run detected: ${LATEST_ID}"
              echo "BOT_RUN_ID=${LATEST_ID}" >> $GITHUB_ENV
              break
            fi

            sleep 10
            ELAPSED=$((ELAPSED + 10))
            echo "Waiting... (${ELAPSED}s / ${MAX_WAIT}s)"
          done

          if [ -z "${BOT_RUN_ID:-}" ]; then
            echo "::warning::No new bot workflow run detected within ${MAX_WAIT}s"
            echo "The discussion_comment event may not have triggered the workflow."
            echo "This can happen if the PAT user is the same as the workflow's GITHUB_TOKEN user."
            echo "BOT_RUN_ID=" >> $GITHUB_ENV
          fi

      - name: Wait for bot workflow to complete
        if: env.BOT_RUN_ID != ''
        env:
          GH_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        run: |
          OWNER="${{ steps.repo.outputs.owner }}"
          REPO="${{ steps.repo.outputs.repo }}"
          TIMEOUT="${{ inputs.timeout-minutes || '10' }}"
          MAX_SECONDS=$((TIMEOUT * 60))
          ELAPSED=0

          echo "Waiting for run ${BOT_RUN_ID} to complete (timeout: ${TIMEOUT}m)..."

          while [ $ELAPSED -lt $MAX_SECONDS ]; do
            STATUS=$(gh run view "$BOT_RUN_ID" \
              --repo "${OWNER}/${REPO}" \
              --json status,conclusion \
              --jq '.status')

            if [ "$STATUS" = "completed" ]; then
              CONCLUSION=$(gh run view "$BOT_RUN_ID" \
                --repo "${OWNER}/${REPO}" \
                --json conclusion \
                --jq '.conclusion')
              echo "Bot workflow completed: ${CONCLUSION}"

              if [ "$CONCLUSION" = "success" ]; then
                echo "PASS: Discussions bot workflow succeeded"
              else
                echo "::warning::Bot workflow completed with conclusion: ${CONCLUSION}"
                echo "This may indicate a Copilot SDK error, missing secrets, or model issue."
                # Don't fail — the workflow completing at all validates the wiring
              fi
              break
            fi

            sleep 15
            ELAPSED=$((ELAPSED + 15))
            echo "Status: ${STATUS} (${ELAPSED}s / ${MAX_SECONDS}s)"
          done

          if [ $ELAPSED -ge $MAX_SECONDS ]; then
            echo "::error::Bot workflow did not complete within ${TIMEOUT} minutes"
            exit 1
          fi

      - name: Check for bot response in discussion
        id: verify
        env:
          GH_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        run: |
          OWNER="${{ steps.repo.outputs.owner }}"
          REPO="${{ steps.repo.outputs.repo }}"
          NUMBER="${{ inputs.discussion-number || '2401' }}"
          MY_COMMENT_ID="${{ steps.post.outputs.commentId }}"

          # Fetch the latest comments
          COMMENTS=$(gh api graphql -f query="
            query {
              repository(owner: \"${OWNER}\", name: \"${REPO}\") {
                discussion(number: ${NUMBER}) {
                  comments(last: 5) {
                    nodes {
                      body
                      author { login }
                      createdAt
                      id
                    }
                  }
                }
              }
            }
          " --jq '.data.repository.discussion.comments.nodes')

          echo "Latest comments:"
          echo "$COMMENTS" | jq -r '.[] | "  \(.author.login) (\(.createdAt)): \(.body | .[0:100])..."'

          # Check if there's a response after our comment (from github-actions or a bot user)
          BOT_RESPONSE=$(echo "$COMMENTS" | jq -r '[.[] | select(.author.login == "github-actions" or .author.login == "copilot")] | last // empty')

          if [ -n "$BOT_RESPONSE" ]; then
            BODY=$(echo "$BOT_RESPONSE" | jq -r '.body')
            echo "Bot response found:"
            echo "$BODY"

            if echo "$BODY" | grep -qi '\[ACTION:'; then
              echo "PASS: Response contains [ACTION:] tag"
              echo "verified=full" >> $GITHUB_OUTPUT
            else
              echo "INFO: Response does not contain [ACTION:] tag (bot may not post replies yet)"
              echo "verified=partial" >> $GITHUB_OUTPUT
            fi
          else
            echo "INFO: No bot response found in discussion comments"
            echo "This is expected if the discussions handler does not yet post replies."
            echo "The workflow completion check above validates the SDK integration."
            echo "verified=workflow-only" >> $GITHUB_OUTPUT
          fi

      - name: Cleanup test comment
        if: always()
        env:
          GH_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        run: |
          COMMENT_ID="${{ steps.post.outputs.commentId }}"
          if [ -n "$COMMENT_ID" ]; then
            echo "Deleting test comment ${COMMENT_ID}..."
            gh api graphql -f query='
              mutation($id: ID!) {
                deleteDiscussionComment(input: {id: $id}) {
                  comment { id }
                }
              }
            ' -f id="$COMMENT_ID" 2>/dev/null || echo "Could not delete comment (may need admin access)"
          fi

      - name: Summary
        if: always()
        run: |
          echo "## Integration Test: Discussions Bot" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Comment posted | ${{ steps.post.outputs.commentUrl && 'PASS' || 'FAIL' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Bot workflow triggered | ${{ env.BOT_RUN_ID && 'PASS' || 'SKIP' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Bot response verified | ${{ steps.verify.outputs.verified || 'N/A' }} |" >> $GITHUB_STEP_SUMMARY
