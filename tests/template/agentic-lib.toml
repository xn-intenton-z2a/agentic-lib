# agentic-lib.toml — Configuration for agentic-lib's own CI testing
#
# This file controls how agentic workflows operate on this repository.

[schedule]
tier = "schedule-1"               # schedule-1 through schedule-4
supervisor = "daily"              # off | weekly | daily | hourly | continuous
model = "gpt-5-mini"              # gpt-5-mini | claude-sonnet-4 | gpt-4.1

[paths]
mission = "MISSION.md"
source = "src/lib/"
tests = "tests/unit/"
features = "features/"
library = "library/"
docs = "docs/"
readme = "README.md"
dependencies = "package.json"
contributing = "CONTRIBUTING.md"
library-sources = "SOURCES.md"

[execution]
build = "npm run build"
test = "npm test"
start = "npm run start"

[limits]
feature-issues = 2
maintenance-issues = 1
attempts-per-branch = 3
attempts-per-issue = 2
features-limit = 2
library-limit = 32

[bot]
log-file = "intentïon.md"
